<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://jsdelivr.net" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="../css/main.css">
    <title>Contáctanos - Piquilina Sin Gluten</title>
</head>
<body>

    <header> 
        <!-- Barra de navegación de Bootstrap -->
        <nav class="navbar navbar-expand-lg beige-bg">
            <div> 
                <div class="logo">
                    <img src="../img/logo-piqui.png" alt="logo-piqui">  
                </div>
                
                <button class="navbar-toggler mx-auto mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                 
                <!-- Se restauró 'justify-content-center' para mantener la compatibilidad con los scripts de Bootstrap -->
                <div class="collapse navbar-collapse justify-content-center" id="navbarNavDropdown">
                    <ul class="navbar-nav text-center">
                        <li class="nav-item">
                            <a class="nav-link color-item" aria-current="page" href="../pages/vivir-sin-gluten.html" target="_blank">Vivir sin gluten</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link color-item" href="../pages/contacto.html">Contactanos</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle color-item" href="" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Recetas
                            </a>
                            <ul class="dropdown-menu text-center">
                                <li><a class="dropdown-item color-item" href="../pages/recetas-dulces.html" target="_blank">Recetas Dulces</a> </li>
                                <li><a class="dropdown-item color-item" href="../pages/recetas-saladas.html" target="_blank">Recetas Saladas</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main id="main-contacto">
        <!-- Título de la sección -->
        <section id="section-titulo-contacto">
            <h1>Contáctanos</h1>
            <hr>
        </section>

        <!-- Sección del Formulario con ID -->
        <section id="section-formulario">
            <form id="form-contacto">
                <div class="grupo-campo">
                    <label for="input-nombre">Nombre Completo</label>
                    <input type="text" id="input-nombre" placeholder="Tu nombre" required>
                </div>

                <div class="grupo-campo">
                    <label for="input-email">Correo Electrónico</label>
                    <input type="email" id="input-email" placeholder="tu@email.com" required>
                </div>

                <div class="grupo-campo">
                    <label for="input-asunto">Asunto</label>
                    <input type="text" id="input-asunto" placeholder="Motivo de tu mensaje" required>
                </div>

                <div class="grupo-campo">
                    <label for="textarea-mensaje">Mensaje</label>
                    <textarea id="textarea-mensaje" rows="5" placeholder="Escribe tu consulta aquí..." required></textarea>
                </div>

                <button type="submit" id="btn-enviar">Enviar Mensaje</button>
            </form>
        </section>
    </main>
    
    <footer>
        <nav class="redes-sociales" aria-label="Redes sociales">
            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer" class="enlace-red">
                <img src="../img/instagram.svg" alt="Síguenos en Instagram">
            </a>
            <a href="https://facebook.com" target="_blank" rel="noopener noreferrer" class="enlace-red">
                <img src="../img/facebook.svg" alt="Síguenos en Facebook">
            </a>
            <a href="https://wa.me" target="_blank" rel="noopener noreferrer" class="enlace-red">
                <img src="../img/whatsapp.svg" alt="Contáctanos por WhatsApp">
            </a>
        </nav>

        <p class="copyright">&copy; Todos los derechos reservados</p>
    </footer>

    <script src="https://jsdelivr.net" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
